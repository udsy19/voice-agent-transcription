<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:200px;height:40px}

.pill{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;justify-content:center;
  background:#000;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.6),0 2px 12px rgba(0,0,0,0.35);
  width:0;height:0;opacity:0;
  pointer-events:none;
  transition:width .18s ease-in-out,height .18s ease-in-out,opacity .15s ease,border-radius .18s;
}
/* recording — hold mode (just waveform, compact) */
.pill.rec{
  width:72px;height:30px;opacity:1;pointer-events:auto;
}
/* recording — toggle mode (waveform + stop) */
.pill.rec.wide{
  width:136px;height:30px;
}
/* processing */
.pill.proc{
  width:40px;height:20px;opacity:1;pointer-events:auto;border-radius:10px;
}
/* done — fade out */
.pill.done{
  width:40px;height:20px;opacity:0;pointer-events:none;border-radius:10px;
  transition:opacity .2s linear;
}

/* ── Recording content ── */
.rec-ui{
  display:none;align-items:center;justify-content:center;
  height:100%;width:100%;
}
.pill.rec .rec-ui{display:flex}

/* waveform — centered, no extra padding */
.wv{
  display:flex;align-items:center;justify-content:center;
  gap:2.5px;
  height:100%;
  flex:1;
}
.wv .bar{
  width:3px;min-height:2px;max-height:16px;height:2px;
  background:#fff;border-radius:1.5px;
  transition:height 0.06s ease-out;
}

/* stop button (toggle mode only) */
.stop{
  display:none;align-items:center;gap:4px;
  background:rgba(220,50,47,0.92);
  border:none;border-radius:999px;
  padding:4px 8px;margin-right:5px;
  cursor:pointer;flex-shrink:0;
  transition:opacity .1s,transform .08s;
}
.pill.rec.wide .stop{display:flex}
.stop:hover{opacity:.8}
.stop:active{transform:scale(.92)}
.stop svg{width:8px;height:8px;fill:#fff}
.stop span{font:600 10px/1 -apple-system,'SF Pro Rounded',system-ui,sans-serif;color:#fff}

/* ── Processing dots ── */
.dots{display:none;align-items:center;justify-content:center;gap:3.5px}
.pill.proc .dots{display:flex}
.dots span{
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transition:opacity .4s ease-in-out;
}
.dots span.on{background:rgba(255,255,255,0.9)}
</style>
</head>
<body>
<div class="pill" id="pill">
  <div class="rec-ui">
    <div class="wv" id="wv"></div>
    <button class="stop" id="bst">
      <svg viewBox="0 0 9 9"><rect width="9" height="9" rx="1.5"/></svg>
      <span>Stop</span>
    </button>
  </div>
  <div class="dots" id="dots"><span></span><span></span><span></span></div>
</div>

<script>
const pill=document.getElementById('pill');
const wvEl=document.getElementById('wv');
const dotSpans=document.querySelectorAll('.dots span');

const MULTS=[0.35,0.55,0.75,0.9,1.0,0.9,0.75,0.55,0.35];
const MIN_H=2,MAX_H=16;
const bars=[];
for(let i=0;i<9;i++){const b=document.createElement('div');b.className='bar';wvEl.appendChild(b);bars.push(b)}

let audioLevel=0,smoothLevel=0,st='hidden',triggerMode='hold';
let dotIdx=0,dotTimer=null;

function updateWaveform(){
  if(st==='rec'){
    if(audioLevel>smoothLevel)smoothLevel=smoothLevel*.3+audioLevel*.7;
    else smoothLevel=smoothLevel*.6+audioLevel*.4;
    for(let i=0;i<9;i++){
      const h=MIN_H+(MAX_H-MIN_H)*smoothLevel*MULTS[i];
      bars[i].style.height=Math.max(MIN_H,Math.min(MAX_H,h))+'px';
    }
  }
  requestAnimationFrame(updateWaveform);
}
requestAnimationFrame(updateWaveform);

function startDots(){dotIdx=0;updDots();dotTimer=setInterval(()=>{dotIdx=(dotIdx+1)%3;updDots()},500)}
function stopDots(){if(dotTimer){clearInterval(dotTimer);dotTimer=null}}
function updDots(){dotSpans.forEach((s,i)=>{s.className=i===dotIdx?'on':''})}

function go(s){
  st=s;
  pill.className='pill'+(s==='hidden'?'':' '+s);
  if(s==='rec'&&triggerMode==='toggle')pill.classList.add('wide');
  if(s==='proc')startDots();else stopDots();
  if(s==='done')setTimeout(()=>{if(st==='done'){st='hidden';pill.className='pill'}},700);
}

if(window.electronAPI){
  window.electronAPI.onWsMessage(m=>{
    if(m.type==='audio_level'){audioLevel=m.rms*10;if(audioLevel>1)audioLevel=1}
    if(m.type==='trigger_mode'){triggerMode=m.mode}
    if(m.type==='status'){
      if(m.status==='recording')go('rec');
      else if(m.status==='processing')go('proc');
      else if(m.status==='idle'){
        if(st==='proc'||st==='rec')go('done');
        else{st='hidden';pill.className='pill'}
      }
    }
  });
}

document.getElementById('bst').onclick=e=>{
  e.stopPropagation();
  fetch('http://127.0.0.1:8528/api/stop-recording',{method:'POST'}).catch(()=>{});
};
</script>
</body>
</html>
