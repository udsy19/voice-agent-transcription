<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:320px;height:200px}

.pill{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;justify-content:center;
  background:#000;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.6),0 2px 12px rgba(0,0,0,0.35);
  width:0;height:0;opacity:0;
  pointer-events:none;
  transition:width .22s ease-in-out,height .22s ease-in-out,opacity .15s ease,border-radius .22s;
}
.pill.rec{width:72px;height:30px;opacity:1;pointer-events:auto}
.pill.rec.wide{width:136px;height:30px}
.pill.proc{width:40px;height:20px;opacity:1;pointer-events:auto;border-radius:10px}
.pill.done{width:40px;height:20px;opacity:0;pointer-events:none;border-radius:10px;transition:opacity .2s linear}

/* ── Assistant — dynamic width/height based on text ── */
.pill.assist{
  opacity:1;pointer-events:auto;
  border-radius:12px;
  flex-direction:column;align-items:flex-start;justify-content:flex-start;
  /* width/height set dynamically by JS */
}

/* ── Recording ── */
.rec-ui{display:none;align-items:center;justify-content:center;height:100%;width:100%}
.pill.rec .rec-ui{display:flex}
.wv{display:flex;align-items:center;justify-content:center;gap:2.5px;height:100%;flex:1}
.wv .bar{width:3px;min-height:2px;max-height:16px;height:2px;background:#fff;border-radius:1.5px}
.stop{display:none;align-items:center;gap:4px;background:rgba(220,50,47,.92);border:none;border-radius:999px;padding:4px 8px;margin-right:5px;cursor:pointer;flex-shrink:0}
.pill.rec.wide .stop{display:flex}
.stop svg{width:8px;height:8px;fill:#fff}
.stop span{font:600 10px/1 -apple-system,'SF Pro Rounded',system-ui,sans-serif;color:#fff}

/* ── Processing dots ── */
.dots{display:none;align-items:center;justify-content:center;gap:3.5px}
.pill.proc .dots{display:flex}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25);animation:breathe 1.4s ease-in-out infinite}
.dots span:nth-child(1){animation-delay:0s}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes breathe{0%,100%{background:rgba(255,255,255,.2);transform:scale(.85)}50%{background:rgba(255,255,255,.9);transform:scale(1.1)}}

/* ── Assistant text ── */
.atxt{
  display:none;padding:10px 14px;
  font:400 12px/1.5 -apple-system,'SF Pro Text',system-ui,sans-serif;
  color:rgba(255,255,255,.88);
  width:100%;word-wrap:break-word;
}
.pill.assist .atxt{display:block}
.pill.assist .rec-ui,.pill.assist .dots{display:none}
.atxt .cur{display:inline-block;width:1.5px;height:12px;background:rgba(255,255,255,.5);margin-left:2px;vertical-align:text-bottom;animation:bk .8s step-end infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}

/* Calendar mini-view */
.cal-mini{padding:6px 12px 8px;width:100%;border-top:1px solid rgba(255,255,255,.06)}
.pill.assist .cal-mini{display:block}
.cal-ev{display:flex;gap:8px;padding:3px 0;font-size:10px;color:rgba(255,255,255,.7)}
.cal-ev+.cal-ev{border-top:1px solid rgba(255,255,255,.04)}
.cal-time{font-family:'SF Mono',monospace;color:rgba(255,255,255,.4);min-width:42px;flex-shrink:0}
.cal-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="pill" id="pill">
  <div class="rec-ui">
    <div class="wv" id="wv"></div>
    <button class="stop" id="bst"><svg viewBox="0 0 9 9"><rect width="9" height="9" rx="1.5"/></svg><span>Stop</span></button>
  </div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="atxt" id="atxt"></div>
  <div class="cal-mini" id="calMini" style="display:none"></div>
</div>
<script>
const pill=document.getElementById('pill'),wvEl=document.getElementById('wv'),atxt=document.getElementById('atxt');
const MULTS=[.35,.55,.75,.9,1,.9,.75,.55,.35],MIN_H=2,MAX_H=16,bars=[];
for(let i=0;i<9;i++){const b=document.createElement('div');b.className='bar';wvEl.appendChild(b);bars.push(b)}

let audioLevel=0,smoothLevel=0,st='hidden',triggerMode='hold',assistTimer=null;

// Measure helper to size pill to fit text
const measure=document.createElement('div');
measure.style.cssText='position:absolute;visibility:hidden;font:400 12px/1.5 -apple-system,system-ui,sans-serif;padding:10px 14px;max-width:300px;word-wrap:break-word;white-space:pre-wrap';
document.body.appendChild(measure);

function sizePillToText(text){
  measure.textContent=text;
  const w=Math.min(310,Math.max(140,measure.offsetWidth+8));
  const h=Math.min(190,Math.max(36,measure.offsetHeight+8));
  pill.style.width=w+'px';
  pill.style.height=h+'px';
}

// Per-bar state for organic movement
const barVel=new Float32Array(9);   // velocity for springy motion
const barCur=new Float32Array(9);   // current height
const barPhase=[];                  // random phase offset per bar
for(let i=0;i<9;i++) barPhase.push(Math.random()*Math.PI*2);

function updateWaveform(){
  if(st==='rec'){
    // Fast attack, medium release
    if(audioLevel>smoothLevel)smoothLevel=smoothLevel*.2+audioLevel*.8;
    else smoothLevel=smoothLevel*.85+audioLevel*.15;

    const t=performance.now()/1000;
    for(let i=0;i<9;i++){
      // Target height from audio level
      const base=smoothLevel*MULTS[i];
      // Add organic wave motion (multiple frequencies)
      const wave1=Math.sin(t*3.2+barPhase[i])*0.08;
      const wave2=Math.sin(t*5.7+barPhase[i]*1.6)*0.05;
      const wave3=Math.sin(t*1.8+i*0.9)*0.04;
      // Idle breathing even when quiet
      const idle=Math.sin(t*1.5+barPhase[i])*0.03+0.03;
      const target=MIN_H+(MAX_H-MIN_H)*Math.max(idle,base+wave1+wave2+wave3);
      // Spring physics for smooth, bouncy motion
      const diff=target-barCur[i];
      barVel[i]+=diff*0.35;       // spring force
      barVel[i]*=0.65;            // damping
      barCur[i]+=barVel[i];
      barCur[i]=Math.max(MIN_H,Math.min(MAX_H,barCur[i]));
      bars[i].style.height=barCur[i]+'px';
    }
  }
  requestAnimationFrame(updateWaveform);
}
requestAnimationFrame(updateWaveform);

function go(s){
  if(assistTimer){clearTimeout(assistTimer);assistTimer=null}
  st=s;
  pill.className='pill'+(s==='hidden'?'':' '+s);
  pill.style.width='';pill.style.height=''; // reset inline styles
  if(s==='rec'&&triggerMode==='toggle')pill.classList.add('wide');
  if(s==='done')setTimeout(()=>{if(st==='done'){st='hidden';pill.className='pill'}},700);
  if(s!=='assist'){atxt.innerHTML='';document.getElementById('calMini').style.display='none';document.getElementById('calMini').innerHTML='';}
}

if(window.electronAPI){
  window.electronAPI.onWsMessage(m=>{
    if(m.type==='audio_level'){audioLevel=Math.min(1,m.rms*25)}
    if(m.type==='trigger_mode'){triggerMode=m.mode}
    if(m.type==='calendar_view'&&m.events){
      const cal=document.getElementById('calMini');
      cal.style.display='block';
      cal.innerHTML=m.events.map(e=>{
        let t='';
        try{const d=new Date(e.start);t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}catch{t=e.start}
        return`<div class="cal-ev"><span class="cal-time">${t}</span><span class="cal-title">${e.summary||'(no title)'}</span></div>`;
      }).join('');
    }
    if(m.type==='assistant_stream'){
      if(st!=='assist')go('assist');
      atxt.innerHTML=m.text+(m.done?'':'<span class="cur"></span>');
      // Size pill — account for calendar view if present
      const calH=document.getElementById('calMini').offsetHeight||0;
      measure.textContent=m.text;
      const w=Math.min(310,Math.max(140,measure.offsetWidth+8));
      const h=Math.min(280,Math.max(36,measure.offsetHeight+calH+8));
      pill.style.width=w+'px';
      pill.style.height=h+'px';
      if(m.done){
        if(assistTimer)clearTimeout(assistTimer);
        // Keep visible longer — estimate TTS duration from word count (~3 words/sec)
        const words=(m.text||'').split(' ').length;
        const ttsDuration=Math.max(5000,words*350+3000);
        assistTimer=setTimeout(()=>{if(st==='assist'){st='hidden';pill.className='pill';pill.style.width='';pill.style.height=''}},ttsDuration);
      }
    }
    if(m.type==='status'){
      if(m.status==='recording')go('rec');
      else if(m.status==='processing')go('proc');
      else if(m.status==='idle'){
        if(st==='proc'||st==='rec')go('done');
        else if(st!=='assist'){st='hidden';pill.className='pill'}
      }
    }
  });
}

document.getElementById('bst').onclick=e=>{e.stopPropagation();fetch('http://127.0.0.1:8528/api/stop-recording',{method:'POST'}).catch(()=>{})};

// Mouse event forwarding — let clicks pass through transparent areas
// When mouse enters the visible pill, enable mouse events; otherwise pass through
if(window.electronAPI && window.electronAPI.setIgnoreMouseEvents){
  document.addEventListener('mouseenter',()=>{
    if(st!=='hidden')window.electronAPI.setIgnoreMouseEvents(false);
  });
  document.addEventListener('mouseleave',()=>{
    window.electronAPI.setIgnoreMouseEvents(true,{forward:true});
  });
}
// Also handle via CSS — transparent areas don't catch events
pill.addEventListener('mouseenter',()=>{
  if(window.electronAPI&&window.electronAPI.setIgnoreMouseEvents)
    window.electronAPI.setIgnoreMouseEvents(false);
});
pill.addEventListener('mouseleave',()=>{
  if(window.electronAPI&&window.electronAPI.setIgnoreMouseEvents)
    window.electronAPI.setIgnoreMouseEvents(true,{forward:true});
});
</script>
</body>
</html>
