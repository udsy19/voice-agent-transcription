<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:180px;height:40px}

.pill{
  position:absolute;top:3px;left:3px;right:3px;bottom:3px;
  display:flex;align-items:center;
  padding:0 4px;gap:4px;
  background:rgba(15,10,5,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:17px;
  box-shadow:0 2px 12px rgba(0,0,0,0.35),inset 0 0 0 0.5px rgba(255,255,255,0.05);
  -webkit-app-region:drag;
  transform:translateY(-8px) scale(0.92);opacity:0;
  animation:pill-in .25s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes pill-in{to{transform:translateY(0) scale(1);opacity:1}}
.pill.out{animation:pill-out .2s ease-in forwards}
@keyframes pill-out{to{transform:translateY(-6px) scale(0.95);opacity:0}}

.btn{
  width:24px;height:24px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .1s;-webkit-app-region:no-drag;flex-shrink:0;
}
.btn:hover{opacity:.7}
.btn:active{transform:scale(.88)}
.btn-x{background:rgba(255,255,255,0.08)}
.btn-x svg{width:8px;height:8px}
.btn-stop{background:#dc3545}
.btn-stop .sq{width:8px;height:8px;background:#fff;border-radius:1.5px}

.mid{flex:1;height:24px;display:flex;align-items:center;overflow:hidden;position:relative}
canvas{display:block}

.proc{
  display:none;align-items:center;justify-content:center;gap:5px;
  width:100%;height:100%;
}
.proc.on{display:flex}
.spin{
  width:11px;height:11px;border:1.5px solid rgba(255,255,255,0.1);
  border-top-color:rgba(255,255,255,0.5);border-radius:50%;
  animation:sp .5s linear infinite;flex-shrink:0;
}
@keyframes sp{to{transform:rotate(360deg)}}
.proc span{font:500 9px/1 -apple-system,system-ui,sans-serif;color:rgba(255,255,255,0.35)}
</style>
</head>
<body>
<div class="pill" id="pill">
  <button class="btn btn-x" id="bx">
    <svg viewBox="0 0 8 8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round">
      <line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/>
    </svg>
  </button>
  <div class="mid">
    <canvas id="cv"></canvas>
    <div class="proc" id="proc"><div class="spin"></div><span id="pt">Transcribing</span></div>
  </div>
  <button class="btn btn-stop" id="bs"><div class="sq"></div></button>
</div>

<script>
const pill=document.getElementById('pill'),cv=document.getElementById('cv');
const mid=document.querySelector('.mid'),proc=document.getElementById('proc');

function sz(){
  const r=mid.getBoundingClientRect();
  cv.width=Math.floor(r.width)*2;cv.height=Math.floor(r.height)*2;
  cv.style.width=Math.floor(r.width)+'px';cv.style.height=Math.floor(r.height)+'px';
}
sz();

const ctx=cv.getContext('2d');
let tgt=0,cur=0,st='rec',q='good';

function draw(){
  const W=cv.width,H=cv.height,N=16,GAP=3,BW=Math.max(2,(W-(N-1)*GAP)/N);
  ctx.clearRect(0,0,W,H);

  if(st==='rec'){
    cur+=(tgt-cur)*.2;
    const cols={good:'rgba(255,255,255,.65)',fair:'rgba(255,200,100,.6)',low:'rgba(255,120,120,.45)'};
    ctx.fillStyle=cols[q]||cols.good;
    for(let i=0;i<N;i++){
      const ph=Date.now()/140+i*.9,w=Math.sin(ph)*.4+.6;
      const h=Math.max(3,Math.min(H*.8,cur*500*w+Math.random()*cur*60));
      ctx.beginPath();ctx.roundRect(i*(BW+GAP),(H-h)/2,BW,h,BW/2);ctx.fill();
    }
  } else if(st==='processing'){
    const sx=((Date.now()/8)%(W+80))-40;
    for(let i=0;i<N;i++){
      const wave=Math.sin(Date.now()/350+i*.4)*.5+.5,h=4+wave*8;
      let a=.08;const d=Math.abs(i*(BW+GAP)-sx);if(d<40)a+=(1-d/40)*.2;
      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.beginPath();ctx.roundRect(i*(BW+GAP),(H-h)/2,BW,h,BW/2);ctx.fill();
    }
  } else {
    for(let i=0;i<N;i++){
      ctx.fillStyle='rgba(255,255,255,.06)';
      ctx.beginPath();ctx.roundRect(i*(BW+GAP),(H-3)/2,BW,3,1.5);ctx.fill();
    }
  }
  requestAnimationFrame(draw);
}
draw();

function setS(s,d){
  st=s;
  cv.style.display=s==='processing'?'none':'block';
  proc.classList.toggle('on',s==='processing');
  if(s==='processing')document.getElementById('pt').textContent=d&&d.includes('Clean')?'Cleaning':'Transcribing';
  if(s==='done'){pill.classList.add('out')}
  else{pill.classList.remove('out')}
}

if(window.electronAPI){
  window.electronAPI.onWsMessage(m=>{
    if(m.type==='audio_level'){tgt=m.rms;if(m.quality)q=m.quality}
    if(m.type==='status'){
      if(m.status==='recording')setS('rec');
      else if(m.status==='processing')setS('processing',m.detail);
      else if(m.status==='idle')setS('done');
    }
  });
}

document.getElementById('bx').onclick=e=>{e.stopPropagation();fetch('http://127.0.0.1:8528/api/cancel-recording',{method:'POST'}).catch(()=>{})};
document.getElementById('bs').onclick=e=>{e.stopPropagation();fetch('http://127.0.0.1:8528/api/stop-recording',{method:'POST'}).catch(()=>{})};
</script>
</body>
</html>
