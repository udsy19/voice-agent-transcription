<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
/* ── Base reset + shared font ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  --mono:'SF Mono',SFMono-Regular,Menlo,monospace;
  --text:rgba(255,255,255,.92);
  --text2:rgba(255,255,255,.55);
  --text3:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.08);
  --blue:rgba(59,130,246,.4);
  --surface:rgba(255,255,255,.08);
}
html,body{background:transparent;overflow:hidden;width:340px;height:320px;font-family:var(--font);-webkit-font-smoothing:antialiased}

html.light{--text:rgba(0,0,0,.88);--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.3);--border:rgba(0,0,0,.06);--accent:rgba(99,102,241,.7)}
html.light .pill{background:rgba(255,255,255,.85);backdrop-filter:blur(40px) saturate(1.3);box-shadow:0 0 0 0.5px rgba(0,0,0,.06),0 8px 30px rgba(0,0,0,.1)}
html.light .wv .bar{background:#222}
html.light .dots span{background:rgba(0,0,0,.2)}
html.light .atxt{color:#1a1a1a}
html.light .stop{background:rgba(220,50,47,.85)}

/* ── Pill container ── */
.pill{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,8,8,.82);
  backdrop-filter:blur(40px) saturate(1.3);-webkit-backdrop-filter:blur(40px) saturate(1.3);
  border-radius:999px;
  overflow:hidden;
  box-shadow:0 0 0 0.5px rgba(255,255,255,.04),0 12px 40px rgba(0,0,0,0.5);
  width:0;height:0;opacity:0;
  pointer-events:none;
  transition:width .2s ease,height .2s ease,opacity .15s ease,border-radius .2s;
}

/* ── States ── */
.pill.rec{width:72px;height:30px;opacity:1;pointer-events:auto}
.pill.rec.wide{width:136px;height:30px}
.pill.proc{width:44px;height:22px;opacity:1;pointer-events:auto;border-radius:11px}
.pill.done{width:44px;height:22px;opacity:0;pointer-events:none;border-radius:11px;transition:opacity .18s linear}
.pill.assist{
  opacity:1;pointer-events:auto;border-radius:18px;
  flex-direction:column;align-items:stretch;justify-content:flex-start;
}
.pill.notify{width:280px;height:36px;opacity:1;pointer-events:auto;border-radius:18px}
.notify-ui{display:none;align-items:center;gap:8px;padding:0 14px;width:100%;height:100%}
.pill.notify .notify-ui{display:flex}
.notify-icon{font-size:14px;flex-shrink:0}
.notify-text{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* ── Recording waveform ── */
.rec-ui{display:none;align-items:center;justify-content:center;height:100%;width:100%}
.pill.rec .rec-ui{display:flex}
.wv{display:flex;align-items:center;justify-content:center;gap:2.5px;height:100%;flex:1}
.wv .bar{width:3px;min-height:2px;max-height:16px;height:2px;background:linear-gradient(to top,#fff,rgba(255,255,255,.7));border-radius:1.5px;transition:height .08s ease-out}
.stop{display:none;align-items:center;gap:4px;background:rgba(220,50,47,.9);border:none;border-radius:999px;padding:4px 8px;margin-right:5px;cursor:pointer;flex-shrink:0}
.pill.rec.wide .stop{display:flex}
.stop svg{width:8px;height:8px;fill:#fff}
.stop span{font:600 10px/1 var(--font);color:#fff}

/* ── Processing dots ── */
.dots{display:none;align-items:center;justify-content:center;gap:3.5px}
.pill.proc .dots{display:flex}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.2);animation:breathe 1.4s ease-in-out infinite}
.dots span:nth-child(1){animation-delay:0s}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes breathe{0%,100%{background:rgba(255,255,255,.18);transform:scale(.85)}50%{background:rgba(255,255,255,.85);transform:scale(1.1)}}

/* ── Assistant text ── */
.atxt{
  display:none;padding:10px 14px 6px;
  font-size:13px;font-weight:400;line-height:1.5;
  color:var(--text);
  width:100%;word-wrap:break-word;white-space:pre-wrap;
  flex-shrink:0;
}
.atxt.tool{color:var(--text2);font-size:11px;padding:7px 12px 5px;font-weight:400}
.pill.assist .atxt{display:block}
.pill.assist .rec-ui,.pill.assist .dots{display:none}
.atxt .cur{display:inline-block;width:1.5px;height:12px;background:rgba(255,255,255,.45);margin-left:2px;vertical-align:text-bottom;animation:bk .8s step-end infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}

/* ── Messages ── */
.msg-mini{
  padding:6px 10px 8px;width:100%;
  border-top:1px solid var(--border);
  max-height:160px;overflow-y:auto;flex-shrink:0;
}
.msg-mini::-webkit-scrollbar{width:3px}
.msg-mini::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg-row{margin-bottom:4px}
.msg-row::after{content:'';display:block;clear:both}
.msg-sender{font-size:9px;font-weight:500;color:var(--text2);margin:6px 0 2px;letter-spacing:.01em}
.msg-bubble{
  max-width:82%;padding:5px 9px;
  border-radius:12px;font-size:12px;line-height:1.4;
  word-wrap:break-word;
}
.msg-them{background:var(--surface);color:var(--text);float:left;border-bottom-left-radius:4px}
.msg-me{background:var(--blue);color:#fff;float:right;border-bottom-right-radius:4px}
.msg-time{font-size:8px;color:var(--text3);margin-top:2px}

/* ── Calendar ── */
.cal-mini{
  padding:6px 10px 8px;width:100%;
  border-top:1px solid var(--border);
  max-height:160px;overflow-y:auto;flex-shrink:0;
}
.cal-mini::-webkit-scrollbar{width:3px}
.cal-mini::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.pill.assist .cal-mini{display:block}
.cal-day{font-size:9px;font-weight:600;color:var(--text2);padding:5px 0 2px;letter-spacing:.01em}
.cal-day+.cal-day{margin-top:2px;border-top:1px solid var(--border)}
.cal-ev{display:flex;gap:8px;padding:3px 0;font-size:12px;color:var(--text)}
.cal-ev+.cal-ev{border-top:1px solid rgba(255,255,255,.03)}
.cal-time{font-family:var(--mono);font-size:10px;color:var(--text2);min-width:52px;flex-shrink:0}
.cal-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="pill" id="pill">
  <div class="rec-ui">
    <div class="wv" id="wv"></div>
    <button class="stop" id="bst"><svg viewBox="0 0 9 9"><rect width="9" height="9" rx="1.5"/></svg><span>Stop</span></button>
  </div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="notify-ui"><span class="notify-icon" id="notifyIcon"></span><span class="notify-text" id="notifyTxt"></span></div>
  <div class="atxt" id="atxt"></div>
  <div class="msg-mini" id="msgMini" style="display:none"></div>
  <div class="cal-mini" id="calMini" style="display:none"></div>
</div>
<script>
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
const pill=document.getElementById('pill'),wvEl=document.getElementById('wv'),atxt=document.getElementById('atxt');
const msgMini=document.getElementById('msgMini'),calMini=document.getElementById('calMini');
const MULTS=[.35,.55,.75,.9,1,.9,.75,.55,.35],MIN_H=2,MAX_H=16,bars=[];
for(let i=0;i<9;i++){const b=document.createElement('div');b.className='bar';wvEl.appendChild(b);bars.push(b)}

let audioLevel=0,smoothLevel=0,st='hidden',triggerMode='hold',assistTimer=null;

// Measure div — MUST match .atxt font exactly
const measure=document.createElement('div');
measure.style.cssText=`position:absolute;visibility:hidden;
  font:400 13px/1.5 -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  padding:10px 14px;max-width:300px;word-wrap:break-word;white-space:pre-wrap;
  -webkit-font-smoothing:antialiased`;
document.body.appendChild(measure);

// Waveform
const barVel=new Float32Array(9),barCur=new Float32Array(9),barPhase=[];
for(let i=0;i<9;i++) barPhase.push(Math.random()*Math.PI*2);

function updateWaveform(){
  if(st==='rec'){
    if(audioLevel>smoothLevel)smoothLevel=smoothLevel*.2+audioLevel*.8;
    else smoothLevel=smoothLevel*.85+audioLevel*.15;
    const t=performance.now()/1000;
    for(let i=0;i<9;i++){
      const base=smoothLevel*MULTS[i];
      const wave1=Math.sin(t*3.2+barPhase[i])*0.08;
      const wave2=Math.sin(t*5.7+barPhase[i]*1.6)*0.05;
      const idle=Math.sin(t*1.5+barPhase[i])*0.03+0.03;
      const target=MIN_H+(MAX_H-MIN_H)*Math.max(idle,base+wave1+wave2);
      const diff=target-barCur[i];
      barVel[i]+=diff*0.35;barVel[i]*=0.65;
      barCur[i]=Math.max(MIN_H,Math.min(MAX_H,barCur[i]+barVel[i]));
      bars[i].style.height=barCur[i]+'px';
    }
  }
  requestAnimationFrame(updateWaveform);
}
requestAnimationFrame(updateWaveform);

function resizePill(){
  let totalH=0,maxW=0;

  // Text content
  if(atxt.style.display!=='none'&&atxt.textContent){
    measure.textContent=atxt.textContent;
    maxW=measure.offsetWidth+28;
    totalH+=measure.offsetHeight+2;
  }
  // Messages
  if(msgMini.style.display!=='none'&&msgMini.innerHTML){
    const mh=Math.min(160,msgMini.scrollHeight);
    totalH+=mh;
    maxW=Math.max(maxW,220);
  }
  // Calendar
  if(calMini.style.display!=='none'&&calMini.innerHTML){
    const ch=Math.min(160,calMini.scrollHeight);
    totalH+=ch;
    maxW=Math.max(maxW,240);
  }

  const w=Math.min(310,Math.max(100,maxW));
  const h=Math.min(300,Math.max(28,totalH));
  pill.style.width=w+'px';
  pill.style.height=h+'px';
}

function go(s){
  if(assistTimer){clearTimeout(assistTimer);assistTimer=null}
  st=s;
  pill.className='pill'+(s==='hidden'?'':' '+s);
  pill.style.width='';pill.style.height='';
  if(s==='rec'&&triggerMode==='toggle')pill.classList.add('wide');
  if(s==='done')setTimeout(()=>{if(st==='done'){st='hidden';pill.className='pill'}},700);
  if(s!=='assist'){atxt.innerHTML='';atxt.className='atxt';calMini.style.display='none';calMini.innerHTML='';msgMini.style.display='none';msgMini.innerHTML='';}
}

if(window.electronAPI){
  if(window.electronAPI.onThemeChange){
    window.electronAPI.onThemeChange(msg=>{document.documentElement.classList.toggle('light',msg.theme==='light')});
  }
  window.electronAPI.onWsMessage(m=>{
    if(m.type==='audio_level'){audioLevel=Math.min(1,m.rms*25)}
    if(m.type==='trigger_mode'){triggerMode=m.mode}

    // ── Messages view ──
    if(m.type==='messages_view'&&m.messages){
      if(st!=='assist')go('assist');
      msgMini.style.display='block';
      let lastSender='';
      msgMini.innerHTML=m.messages.map(msg=>{
        const isMe=msg.from==='me';
        const showSender=!isMe&&msg.from!==lastSender;
        lastSender=msg.from;
        const sender=showSender?`<div class="msg-sender">${esc(msg.from)}</div>`:'';
        const time=msg.time?`<div class="msg-time">${esc(msg.time.split(' ').pop()||'')}</div>`:'';
        return`<div class="msg-row">${sender}<div class="msg-bubble ${isMe?'msg-me':'msg-them'}">${esc(msg.text)}${time}</div></div>`;
      }).join('');
      msgMini.scrollTop=msgMini.scrollHeight;
      requestAnimationFrame(resizePill);
    }

    // ── Calendar view ──
    if(m.type==='calendar_view'&&m.events){
      if(st!=='assist')go('assist');
      calMini.style.display='block';
      let lastDay='';
      calMini.innerHTML=m.events.map(e=>{
        let t='',day='';
        try{
          const d=new Date(e.start);
          t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
          day=d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
        }catch{t=e.start||''}
        let header='';
        if(day&&day!==lastDay){header=`<div class="cal-day">${day}</div>`;lastDay=day}
        return header+`<div class="cal-ev"><span class="cal-time">${esc(t)}</span><span class="cal-title">${esc(e.summary||'(no title)')}</span></div>`;
      }).join('');
      requestAnimationFrame(resizePill);
    }

    // ── Assistant stream ──
    // ── Pill notification ──
    if(m.type==='pill_notify'&&(st==='hidden'||st==='done')){
      const iconMap={calendar:'📅',memory:'💡',todo:'✓',followup:'📧',meeting:'🎙',info:'ℹ'};
      document.getElementById('notifyIcon').textContent=iconMap[m.icon]||'ℹ';
      document.getElementById('notifyTxt').textContent=m.text||'';
      go('notify');
      setTimeout(()=>{if(st==='notify')go('hidden')},m.duration_ms||3500);
    }

    if(m.type==='assistant_stream'){
      if(st!=='assist')go('assist');
      const isToolMsg=!m.done&&(m.text.startsWith('Running ')||m.text.startsWith('Retrying '));
      atxt.className=isToolMsg?'atxt tool':'atxt';
      atxt.innerHTML=esc(m.text)+(m.done?'':'<span class="cur"></span>');
      requestAnimationFrame(resizePill);

      if(m.done){
        if(assistTimer)clearTimeout(assistTimer);
        const words=(m.text||'').split(' ').length;
        const ttsDuration=Math.max(5000,words*350+3000);
        assistTimer=setTimeout(()=>{
          if(st==='assist'){st='hidden';pill.className='pill';pill.style.width='';pill.style.height=''}
        },ttsDuration);
      }
    }

    // ── Status ──
    if(m.type==='status'){
      if(m.status==='recording')go('rec');
      else if(m.status==='processing')go('proc');
      else if(m.status==='idle'){
        if(st==='proc'||st==='rec')go('done');
        else if(st!=='assist'){st='hidden';pill.className='pill'}
      }
    }
  });
}

document.getElementById('bst').onclick=e=>{e.stopPropagation();fetch('http://127.0.0.1:8528/api/stop-recording',{method:'POST'}).catch(()=>{})};

// Mouse forwarding
if(window.electronAPI&&window.electronAPI.setIgnoreMouseEvents){
  document.addEventListener('mouseenter',()=>{if(st!=='hidden')window.electronAPI.setIgnoreMouseEvents(false)});
  document.addEventListener('mouseleave',()=>{window.electronAPI.setIgnoreMouseEvents(true,{forward:true})});
}
pill.addEventListener('mouseenter',()=>{if(window.electronAPI&&window.electronAPI.setIgnoreMouseEvents)window.electronAPI.setIgnoreMouseEvents(false)});
pill.addEventListener('mouseleave',()=>{if(window.electronAPI&&window.electronAPI.setIgnoreMouseEvents)window.electronAPI.setIgnoreMouseEvents(true,{forward:true})});
</script>
</body>
</html>
